spring:
  datasource:
    url: jdbc:mysql://localhost:3306/posty?rewriteBatchedStatements=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        generate_statistics: true
        jdbc:
          batch_size: 1000
    show-sql: false

decorator:
  datasource:
    p6spy:
      enable-logging: true
      logging: slf4j
