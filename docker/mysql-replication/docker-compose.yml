services:
  mysql-source:
    image: mysql:8.0
    container_name: posty-mysql-source
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: posty
    ports:
      - "3307:3306"
    volumes:
      - ./source/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./scripts/setup-replication.sh:/docker-entrypoint-initdb.d/setup-replication.sh
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  mysql-replica:
    image: mysql:8.0
    container_name: posty-mysql-replica
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: posty
    ports:
      - "3308:3306"
    volumes:
      - ./replica/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./scripts/init-replica.sh:/docker-entrypoint-initdb.d/init-replica.sh
    depends_on:
      mysql-source:
        condition: service_healthy
